name: CI
permissions:
  contents: write
  id-token: write
  pull-requests: write

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # The node version to release with, generally the latest LTS
  release_node: 24.x

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Test against multiple node versions
        # Any currently maintained version, e.g. whether they are current, active or maintenance should be included
        node: [22.x, 24.x, 25.x]
    name: Build, Test & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # https://github.com/pnpm/action-setup/releases/tag/v6.0.3
        with:
          version: 10.33.2

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.node }}-

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install

      - name: Turbo build
        run: pnpm build

      - name: Lint, Prettier, and Typecheck
        run: pnpm lint:ci

      - name: Test packages
        run: pnpm test
        env:
          VITE_BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          VITE_BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}

      # Only release with the version set in release_node and on a push to main
      - if: ${{ matrix.node == env.release_node && github.ref == 'refs/heads/main' && github.repository == 'pewtro/blizzard-api' }}
        name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0 Commit hash taken from https://github.com/changesets/action/tree/v1/src
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
